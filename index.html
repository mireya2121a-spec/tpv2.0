<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TPV - Bar Hogar Jubilados</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
--gold: #D4A017; --gold-light: #F0C040; --dark: #111111; --dark2: #1A1A1A;
--dark3: #242424; --card: #2A2A2A; --border: #3A3A3A; --text: #F0F0F0;
--text-dim: #888; --green: #2ECC71; --red: #E74C3C; --blue: #3498DB; --orange: #E67E22;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Nunito', sans-serif; background:var(--dark); color:var(--text); height:100vh; overflow:hidden; display:flex; flex-direction:column; }
header { background: linear-gradient(135deg, #1A1A1A 0%, #2A2200 100%); border-bottom: 2px solid var(--gold); padding: 8px 16px; display: flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.logo { display:flex; align-items:center; gap:10px; }
.logo-icon { width:36px; height:36px; background:var(--gold); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px; color: #000; }
.logo h1 { font-family:'Bebas Neue'; font-size:22px; color:var(--gold); letter-spacing:2px; }
.header-right { display:flex; align-items:center; gap:12px; }
.clock { font-family:'Bebas Neue'; font-size:24px; color:var(--gold-light); letter-spacing:2px; }
.mode-btn { padding:5px 12px; border-radius:20px; border:1px solid var(--border); background:transparent; color:var(--text-dim); cursor:pointer; font-size:12px; transition:all .2s; }
.mode-btn.active { background:var(--gold); color:#000; border-color:var(--gold); font-weight:700; }
main { display:flex; flex:1; overflow:hidden; }
.menu-panel { flex:1; display:flex; flex-direction:column; border-right:2px solid var(--border); overflow:hidden; }
.category-tabs { display:flex; gap:0; border-bottom:2px solid var(--border); background:var(--dark2); overflow-x:auto; flex-shrink:0; }
.cat-tab { padding:10px 14px; cursor:pointer; font-size:12px; font-weight:700; white-space:nowrap; border-bottom:3px solid transparent; color:var(--text-dim); display:flex; align-items:center; gap:6px; }
.cat-tab.active { color:var(--gold); border-bottom-color:var(--gold); background:var(--dark3); }
.products-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(130px, 1fr)); gap:8px; padding:10px; overflow-y:auto; flex:1; }
.product-card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:10px 8px; cursor:pointer; transition:all .15s; text-align:center; display:flex; flex-direction:column; gap:4px; }
.product-card:hover { border-color:var(--gold); transform:translateY(-2px); }
.p-price { font-size:13px; font-weight:800; color:var(--gold); }
.ticket-panel { width: 320px; display:flex; flex-direction:column; background:var(--dark2); flex-shrink:0; }
.ticket-header { padding:10px 14px; border-bottom:2px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.ticket-items { flex:1; overflow-y:auto; padding:8px; }
.ticket-footer { border-top:2px solid var(--border); padding:10px 14px; }
.total-row.main { font-size:22px; font-family:'Bebas Neue'; color:var(--gold); border-top:1px solid var(--border); padding-top:6px; display:flex; justify-content:space-between; }
.pay-btn { padding:12px 6px; border-radius:10px; border:none; cursor:pointer; font-weight:800; width:48%; }
.pay-btn.efectivo { background:var(--green); color:#fff; }
.pay-btn.tarjeta { background:var(--blue); color:#fff; }
.notif { position:fixed; top:70px; right:20px; z-index:500; }
.notif-item { background:var(--dark2); border:1px solid var(--gold); border-radius:10px; padding:10px 16px; margin-bottom:5px; animation: slideIn 0.3s ease; }
@keyframes slideIn { from{transform:translateX(100px);opacity:0} to{transform:translateX(0);opacity:1} }
</style>
</head>
<body>

<header>
<div class="logo">
<div class="logo-icon">☕</div>
<div><h1>Hogar Jubilados</h1></div>
</div>
<div class="header-right">
<div>
<div class="clock" id="clock">00:00</div>
</div>
<div class="mode-toggle">
<button class="mode-btn active">🖥️ TPV</button>
</div>
</div>
</header>

<main>
<div class="menu-panel">
<div class="category-tabs" id="categoryTabs"></div>
<div class="products-grid" id="productsGrid"></div>
</div>
<div class="ticket-panel">
<div class="ticket-header"><h2>🧾 Comanda</h2></div>
<div class="ticket-items" id="ticketItems"></div>
<div class="ticket-footer">
<div class="total-row main"><span>TOTAL</span><span id="totalDisplay">0,00 €</span></div>
<div style="display:flex; justify-content:space-between; margin-top:10px;">
<button class="pay-btn efectivo" onclick="alert('Cobrando...')">💵 Efectivo</button>
<button class="pay-btn tarjeta" onclick="alert('Cobrando...')">💳 Tarjeta</button>
</div>
</div>
</div>
</main>

<div class="notif" id="notifContainer"></div>

<script>
// Datos simplificados para probar que carga
const categories = [
{ id:'cafes', name:'Cafés', icon:'☕' },
{ id:'refrescos', name:'Refrescos', icon:'🥤' },
{ id:'cervezas', name:'Cervezas', icon:'🍺' }
];

const products = {
cafes: [
{ name: 'Café Solo', price: 1.30, icon: '☕' },
{ name: 'Cortado', price: 1.40, icon: '☕' },
{ name: 'Café con Leche', price: 1.70, icon: '☕' }
],
refrescos: [
{ name: 'Coca Cola', price: 2.10, icon: '🥤' },
{ name: 'Agua', price: 1.00, icon: '💧' }
]
};

let currentCat = 'cafes';

function render() {
const tabs = document.getElementById('categoryTabs');
tabs.innerHTML = categories.map(c =>
`<div class="cat-tab ${c.id===currentCat?'active':''}" onclick="setCat('${c.id}')">${c.icon} ${c.name}</div>`
).join('');

const grid = document.getElementById('productsGrid');
grid.innerHTML = (products[currentCat] || []).map(p => `
<div class="product-card" onclick="add('${p.name}', ${p.price})">
<div>${p.icon}</div>
<div style="font-size:12px; font-weight:bold;">${p.name}</div>
<div class="p-price">${p.price.toFixed(2)}€</div>
</div>
`).join('');
}

function setCat(id) { currentCat = id; render(); }

function add(name, price) {
const n = document.createElement('div');
n.className = 'notif-item';
n.textContent = 'Añadido: ' + name;
document.getElementById('notifContainer').appendChild(n);
setTimeout(() => n.remove(), 2000);
}

function updateClock() {
document.getElementById('clock').textContent = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
}

setInterval(updateClock, 1000);
render();
updateClock();
</script>
</body>
</html>
